<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spendly — Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --surface3: #1e1e28;
    --border: #2a2a38;
    --accent: #c8f135;
    --accent2: #7c6af5;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --danger: #ff5c5c;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* LAYOUT */
  .container { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .stat-card:hover::after { transform: scaleX(1); }
  .stat-card:hover { border-color: var(--accent); }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
  }

  .stat-value.accent { color: var(--accent); }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* MAIN GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.3px;
  }

  /* FORM */
  .form-body { padding: 24px; }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--surface3);
  }

  select option { background: var(--surface2); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* CAT PILLS */
  .cat-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .pill {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .pill:hover { border-color: var(--text); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-family: var(--font-mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 500;
    width: 100%;
    justify-content: center;
  }

  .btn-primary:hover { background: #d8ff45; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  .btn-export {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--accent);
    font-size: 12px;
    padding: 7px 14px;
  }

  .btn-export:hover { background: var(--accent); color: #000; }

  /* RIGHT PANEL */
  .right-col { display: flex; flex-direction: column; gap: 24px; }

  /* FILTERS */
  .filter-bar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-bar select {
    width: auto;
    min-width: 140px;
    font-size: 12px;
    padding: 7px 12px;
  }

  .filter-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  /* EXPENSE LIST */
  .expense-list { max-height: 420px; overflow-y: auto; }

  .expense-list::-webkit-scrollbar { width: 4px; }
  .expense-list::-webkit-scrollbar-track { background: transparent; }
  .expense-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .expense-row {
    display: grid;
    grid-template-columns: 36px 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .expense-row:last-child { border-bottom: none; }
  .expense-row:hover { background: var(--surface2); }

  .cat-dot {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .expense-info .title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--font-head);
  }

  .expense-info .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .expense-amount {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
  }

  .btn-del {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    font-size: 16px;
    line-height: 1;
  }

  .btn-del:hover { color: var(--danger); background: rgba(255,92,92,0.1); }

  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* CHARTS */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .chart-body { padding: 24px; }
  .chart-body canvas { max-height: 220px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--accent);
    color: #000;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* LOADER */
  .loading {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .loading { animation: pulse 1.5s infinite; }

  @media (max-width: 1100px) {
    .main-grid { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .container { padding: 20px; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">spend<span>ly</span></div>
  <div class="header-actions">
    <button class="btn btn-export" onclick="exportCSV()">↓ Export CSV</button>
  </div>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-value accent" id="stat-month">—</div>
      <div class="stat-sub" id="stat-month-count">0 expenses</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total All Time</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub" id="stat-total-count">0 expenses</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Category</div>
      <div class="stat-value" id="stat-top-cat" style="font-size:22px">—</div>
      <div class="stat-sub" id="stat-top-cat-amount">this month</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Daily Average</div>
      <div class="stat-value" id="stat-daily">—</div>
      <div class="stat-sub">this month</div>
    </div>
  </div>

  <div class="main-grid">

    <!-- ADD FORM -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Add Expense</span>
      </div>
      <div class="form-body">
        <div class="field">
          <label>Title</label>
          <input type="text" id="f-title" placeholder="What did you spend on?" />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Amount (R)</label>
            <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" />
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="f-date" />
          </div>
        </div>
        <div class="field">
          <label>Category</label>
          <div class="cat-pills" id="cat-selector">
            {% for cat in categories %}
            <button class="pill {% if loop.first %}active{% endif %}" data-cat="{{ cat }}" onclick="selectCat(this)">{{ cat }}</button>
            {% endfor %}
          </div>
        </div>
        <div class="field">
          <label>Note (optional)</label>
          <input type="text" id="f-note" placeholder="Any extra details..." />
        </div>
        <button class="btn btn-primary" onclick="addExpense()">+ Add Expense</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-col">

      <!-- EXPENSE LIST -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Expenses</span>
          <div style="display:flex; gap:10px; align-items:center;">
            <select id="filter-cat" onchange="loadExpenses()" style="font-size:11px; padding:5px 10px;">
              <option value="">All Categories</option>
              {% for cat in categories %}
              <option value="{{ cat }}">{{ cat }}</option>
              {% endfor %}
            </select>
            <select id="filter-month" onchange="loadExpenses()" style="font-size:11px; padding:5px 10px;">
              <option value="">All Time</option>
            </select>
          </div>
        </div>
        <div id="expense-list" class="expense-list">
          <div class="loading">Loading...</div>
        </div>
      </div>

      <!-- CHARTS -->
      <div class="charts-row">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Monthly Trend</span>
          </div>
          <div class="chart-body">
            <canvas id="chart-monthly"></canvas>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">By Category</span>
          </div>
          <div class="chart-body">
            <canvas id="chart-category"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = {{ colors|safe }};
const ICONS = {
  Food:'🍔', Transport:'🚗', Housing:'🏠', Entertainment:'🎬',
  Health:'💊', Shopping:'🛍️', Education:'📚', Other:'📌'
};

let monthlyChart, categoryChart;
let selectedCat = 'Food';

// Set today's date
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

function selectCat(el) {
  document.querySelectorAll('#cat-selector .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  selectedCat = el.dataset.cat;
}

function fmt(n) {
  return 'R ' + parseFloat(n).toLocaleString('en-ZA', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function loadExpenses() {
  const cat = document.getElementById('filter-cat').value;
  const month = document.getElementById('filter-month').value;
  const res = await fetch(`/api/expenses?category=${cat}&month=${month}`);
  const data = await res.json();
  renderList(data);
  updateStats(data, month);
  await loadCharts();
}

function renderList(expenses) {
  const el = document.getElementById('expense-list');
  if (!expenses.length) {
    el.innerHTML = '<div class="empty-state">No expenses found.<br>Add your first one! 👆</div>';
    return;
  }
  el.innerHTML = expenses.map(e => `
    <div class="expense-row" id="row-${e.id}">
      <div class="cat-dot" style="background:${COLORS[e.category]}22; color:${COLORS[e.category]}">
        ${ICONS[e.category] || '💸'}
      </div>
      <div class="expense-info">
        <div class="title">${e.title}</div>
        <div class="meta">${e.category} · ${e.date}${e.note ? ' · ' + e.note : ''}</div>
      </div>
      <div class="expense-amount">${fmt(e.amount)}</div>
      <button class="btn-del" onclick="deleteExpense(${e.id})" title="Delete">×</button>
    </div>
  `).join('');
}

function updateStats(expenses, selectedMonth) {
  const now = new Date();
  const currentMonth = now.toISOString().slice(0,7);
  const monthKey = selectedMonth || currentMonth;

  const monthExpenses = expenses.filter(e => e.date.startsWith(monthKey));
  const monthTotal = monthExpenses.reduce((s,e) => s + e.amount, 0);
  const allTotal = expenses.reduce((s,e) => s + e.amount, 0);

  document.getElementById('stat-month').textContent = fmt(monthTotal);
  document.getElementById('stat-month-count').textContent = `${monthExpenses.length} expenses`;
  document.getElementById('stat-total').textContent = fmt(allTotal);
  document.getElementById('stat-total-count').textContent = `${expenses.length} total`;

  // Top cat this month
  const catTotals = {};
  monthExpenses.forEach(e => { catTotals[e.category] = (catTotals[e.category]||0) + e.amount; });
  const topCat = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  if (topCat) {
    document.getElementById('stat-top-cat').textContent = ICONS[topCat[0]] + ' ' + topCat[0];
    document.getElementById('stat-top-cat-amount').textContent = fmt(topCat[1]);
  } else {
    document.getElementById('stat-top-cat').textContent = '—';
    document.getElementById('stat-top-cat-amount').textContent = 'this month';
  }

  // Daily avg
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const daysPassed = selectedMonth ? daysInMonth : now.getDate();
  document.getElementById('stat-daily').textContent = daysPassed ? fmt(monthTotal / daysPassed) : 'R 0.00';
}

async function loadCharts() {
  // Monthly trend
  const mRes = await fetch('/api/monthly-summary');
  const mData = await mRes.json();
  mData.reverse();

  const mLabels = mData.map(d => {
    const [y,m] = d.month.split('-');
    return new Date(y,m-1).toLocaleString('default',{month:'short',year:'2-digit'});
  });
  const mVals = mData.map(d => d.total);

  if (monthlyChart) monthlyChart.destroy();
  const mCtx = document.getElementById('chart-monthly').getContext('2d');
  monthlyChart = new Chart(mCtx, {
    type: 'bar',
    data: {
      labels: mLabels,
      datasets: [{
        data: mVals,
        backgroundColor: mVals.map((_,i) => i === mVals.length-1 ? '#c8f135' : '#2a2a38'),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#1e1e28' }, ticks: { color: '#6b6b80', font: { family: 'DM Mono', size: 10 } } },
        y: { grid: { color: '#1e1e28' }, ticks: { color: '#6b6b80', font: { family: 'DM Mono', size: 10 }, callback: v => 'R'+v } }
      }
    }
  });

  // Category donut
  const month = document.getElementById('filter-month').value;
  const cRes = await fetch(`/api/category-summary?month=${month}`);
  const cData = await cRes.json();

  if (categoryChart) categoryChart.destroy();
  const cCtx = document.getElementById('chart-category').getContext('2d');
  categoryChart = new Chart(cCtx, {
    type: 'doughnut',
    data: {
      labels: cData.map(d => d.category),
      datasets: [{
        data: cData.map(d => d.total),
        backgroundColor: cData.map(d => COLORS[d.category] || '#888'),
        borderWidth: 2,
        borderColor: '#111118',
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true,
      cutout: '68%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#6b6b80',
            font: { family: 'DM Mono', size: 10 },
            padding: 12,
            boxWidth: 10,
            boxHeight: 10
          }
        }
      }
    }
  });
}

async function populateMonthFilter() {
  const res = await fetch('/api/monthly-summary');
  const data = await res.json();
  const sel = document.getElementById('filter-month');
  data.forEach(d => {
    const [y,m] = d.month.split('-');
    const label = new Date(y,m-1).toLocaleString('default',{month:'long',year:'numeric'});
    sel.innerHTML += `<option value="${d.month}">${label}</option>`;
  });
}

async function addExpense() {
  const title = document.getElementById('f-title').value.trim();
  const amount = document.getElementById('f-amount').value;
  const date = document.getElementById('f-date').value;
  const note = document.getElementById('f-note').value.trim();

  if (!title || !amount || !date) { showToast('Please fill in all required fields'); return; }

  await fetch('/api/expenses', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title, amount, category: selectedCat, date, note })
  });

  document.getElementById('f-title').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-note').value = '';

  showToast('Expense added ✓');
  await populateMonthFilter();
  await loadExpenses();
}

async function deleteExpense(id) {
  const row = document.getElementById('row-' + id);
  if (row) { row.style.opacity = '0'; row.style.transform = 'translateX(20px)'; row.style.transition = '0.2s'; }
  setTimeout(async () => {
    await fetch('/api/expenses/' + id, { method: 'DELETE' });
    await loadExpenses();
  }, 200);
}

function exportCSV() {
  const cat = document.getElementById('filter-cat').value;
  const month = document.getElementById('filter-month').value;
  window.location.href = `/api/export?category=${cat}&month=${month}`;
  showToast('CSV exported ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
(async () => {
  await populateMonthFilter();
  await loadExpenses();
})();
</script>
</body>
</html>
